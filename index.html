<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>우리의 801일</title>
    <meta
      name="description"
      content="아무데나눌라봐! 매일 하나씩 늘어나는 우리의 기념일 하트 페이지"
    />
    <meta property="og:title" content="우리의 매일 +1일" />
    <meta
      property="og:description"
      content="아무데나눌라봐! 오늘의 숫자와 하트가 터져요"
    />
    <meta property="og:url" content="https://parktj4264.github.io/love-800-days/" />
    <meta
      property="og:image"
      content="https://parktj4264.github.io/love-800-days/assets/link-thumbnail-daily.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://parktj4264.github.io/love-800-days/assets/link-thumbnail-daily.png"
    />
    <meta name="theme-color" content="#171f3d" />
    <link rel="preload" href="assets/couple-photo.jpg" as="image" />
    <link rel="stylesheet" href="styles.css?v=polish4-20260702" />
    <script src="script.js?v=polish4-20260702" defer></script>
  </head>
  <body>
    <main
      class="stage"
      data-base-date="2026-06-30"
      data-base-day="800"
      aria-label="기념일 하트 페이지"
    >
      <canvas id="sparkle-layer" aria-hidden="true"></canvas>

      <section class="message" aria-label="기념 메시지">
        <div class="message-top">
          <p class="kicker" data-day-label>OUR 801ST DAY</p>
          <h1>우리의 <span data-day-count>801</span>일</h1>
        </div>

        <div class="message-bottom">
          <p class="message-line">아무데나눌라봐!</p>
          <div class="day-mark" aria-live="polite" aria-label="801일">
            <span data-day-count>801</span>
            <small>days</small>
          </div>
        </div>
      </section>

      <a class="scroll-cue" href="#moments" aria-label="추억 사진으로 스크롤">
        <span class="scroll-cue-text">스크롤하세요</span>
        <span class="scroll-cue-arrow" aria-hidden="true">↓</span>
      </a>

      <div id="heart-layer" aria-hidden="true"></div>
    </main>

    <section class="memory-section" id="moments" aria-label="추억 사진">
      <div class="memory-inner">
        <div class="memory-heading">
          <p class="memory-kicker">OUR MOMENTS</p>
          <h2>우리의 순간들</h2>
        </div>

        <figure class="memory-photo" data-reveal>
          <img src="assets/couple-photo.jpg" alt="청계천에서 함께 찍은 거울 사진" loading="lazy" />
          <figcaption>이날의 우리</figcaption>
        </figure>
      </div>
    </section>
  </body>
</html>
