<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>우리의 801일</title>
    <meta
      name="description"
      content="아무데나눌라봐! 매일 하나씩 늘어나는 우리의 기념일 하트 페이지"
    />
    <meta property="og:title" content="우리의 매일 +1일" />
    <meta
      property="og:description"
      content="아무데나눌라봐! 오늘의 숫자와 하트가 터져요"
    />
    <meta property="og:url" content="https://parktj4264.github.io/love-800-days/" />
    <meta
      property="og:image"
      content="https://parktj4264.github.io/love-800-days/assets/link-thumbnail-daily.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:image"
      content="https://parktj4264.github.io/love-800-days/assets/link-thumbnail-daily.png"
    />
    <meta name="theme-color" content="#171f3d" />
    <link rel="preload" href="assets/couple-photo.jpg" as="image" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main
      class="stage"
      data-base-date="2026-06-30"
      data-base-day="800"
      aria-label="기념일 하트 페이지"
    >
      <canvas id="sparkle-layer" aria-hidden="true"></canvas>

      <section class="hero" aria-label="기념일 첫 화면">
        <section class="message" aria-label="기념 메시지">
          <div class="message-top">
            <p class="kicker" data-day-label>OUR 801ST DAY</p>
            <h1>우리의 <span data-day-count>801</span>일</h1>
          </div>

          <div class="message-bottom">
            <p class="message-line">아무데나눌라봐!</p>
            <div class="day-mark" aria-live="polite" aria-label="801일">
              <span data-day-count>801</span>
              <small>days</small>
            </div>
          </div>
        </section>
      </section>

      <section class="gallery-section" aria-label="추억 사진">
        <div class="gallery-inner">
          <div class="gallery-heading">
            <p class="gallery-kicker">OUR MOMENTS</p>
            <h2>우리가 지나온 장면들</h2>
          </div>

          <div class="memory-grid">
            <figure
              class="memory-card memory-card-wide"
              style="--delay: 0ms; --tilt: -5deg; --start-x: -2.2rem; --photo-position: center 44%;"
            >
              <img src="assets/couple-photo.jpg" alt="청계천에서 함께 찍은 거울 사진" loading="lazy" />
              <figcaption>이 밤</figcaption>
            </figure>

            <figure
              class="memory-card memory-card-tall"
              style="--delay: 90ms; --tilt: 4deg; --start-x: 1.3rem; --photo-position: center 54%;"
            >
              <img src="assets/couple-photo.jpg" alt="둘이 가까이 담긴 사진" loading="lazy" />
              <figcaption>같이 있던 공기</figcaption>
            </figure>

            <figure
              class="memory-card memory-card-small"
              style="--delay: 170ms; --tilt: -3deg; --start-x: -1rem; --photo-position: center 18%;"
            >
              <img src="assets/couple-photo.jpg" alt="밤 산책 풍경이 담긴 사진" loading="lazy" />
              <figcaption>빛나던 길</figcaption>
            </figure>

            <figure
              class="memory-card memory-card-small"
              style="--delay: 250ms; --tilt: 5deg; --start-x: 1.8rem; --photo-position: center 74%;"
            >
              <img src="assets/couple-photo.jpg" alt="함께 남긴 추억 사진" loading="lazy" />
              <figcaption>앞으로도</figcaption>
            </figure>
          </div>
        </div>
      </section>

      <div id="heart-layer" aria-hidden="true"></div>
    </main>
  </body>
</html>
