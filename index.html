<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>우리의 800일</title>
    <meta
      name="description"
      content="우리의 800번째 하루를 위한 작은 하트 페이지"
    />
    <meta property="og:title" content="우리의 800일" />
    <meta
      property="og:description"
      content="너에게 보내는 800일 기념 하트"
    />
    <meta
      property="og:image"
      content="https://parktj4264.github.io/love-800-days/assets/anniversary-bg.png"
    />
    <meta name="theme-color" content="#171f3d" />
    <link rel="preload" href="assets/anniversary-bg.png" as="image" />
    <link rel="stylesheet" href="styles.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main class="stage" aria-label="800일 기념 하트 페이지">
      <canvas id="sparkle-layer" aria-hidden="true"></canvas>

      <section class="message" aria-label="기념 메시지">
        <p class="kicker">OUR 800TH DAY</p>
        <h1>우리의 800일</h1>
        <p class="message-line">
          너랑 보낸 하루들이 모여<br />
          내가 제일 좋아하는 계절이 됐어.
        </p>
        <div class="day-mark" aria-label="800일">
          <span>800</span>
          <small>days</small>
        </div>
        <p class="signature">앞으로도 계속, 내 마음은 너한테.</p>
      </section>

      <div id="heart-layer" aria-hidden="true"></div>
    </main>
  </body>
</html>
